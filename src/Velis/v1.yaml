openapi: 3.1.1
info:
  title: Velis | v1
  version: 1.0.0
servers:
  - url: https://localhost:3010/
paths:
  /api/fetch-sensors:
    get:
      tags:
        - Velis
      operationId: FetchSensors
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SenorsInfo"
  /api/temperature:
    post:
      tags:
        - Velis
      operationId: SetTemperature
      responses:
        "200":
          description: OK
components:
  schemas:
    Mode:
      enum:
        - Manual
        - Eco
        - Scheduled
    SenorsInfo:
      type: object
      properties:
        on:
          type: boolean
        mode:
          $ref: "#/components/schemas/Mode"
        currentTemperature:
          type: number
          format: double
        requiredTemperature:
          type: number
          format: double
        processingTemperature:
          type: number
          format: double
        antiLegionellaInProgress:
          type: boolean
        isHeating:
          type: boolean
        eco:
          type: boolean
        remainingTime:
          pattern: ^-?(\d+\.)?\d{2}:\d{2}:\d{2}(\.\d{1,7})?$
          type: string
        availableShowers:
          type: integer
          format: int32
tags:
  - name: Velis
